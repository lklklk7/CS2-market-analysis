<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS2 Skin Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #888;
      --accent: #7c6af7;
      --buy: #22c55e;
      --hold: #eab308;
      --sell: #ef4444;
    }
    :root[data-theme="light"] {
      --bg: #f4f4f8;
      --surface: #ffffff;
      --border: #e0e0ec;
      --text: #1a1a2e;
      --muted: #666;
      --accent: #6d5ce7;
      --buy: #16a34a;
      --hold: #ca8a04;
      --sell: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
    header h1 span { color: var(--accent); }
    nav { display: flex; gap: 0.5rem; }
    nav button { background: none; border: 1px solid var(--border); color: var(--text); padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; transition: background 0.15s; }
    nav button.active, nav button:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    #theme-toggle { background: none; border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; color: var(--text); }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .page { display: none; }
    .page.active { display: block; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .card-title { font-weight: 600; font-size: 0.95rem; }
    .badge { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .badge-BUY { background: var(--buy); color: #fff; }
    .badge-HOLD { background: var(--hold); color: #000; }
    .badge-SELL { background: var(--sell); color: #fff; }
    .stat-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--muted); margin: 0.3rem 0; }
    .stat-row span:last-child { color: var(--text); font-weight: 500; }
    .positive { color: var(--buy) !important; }
    .negative { color: var(--sell) !important; }
    .score-bar { height: 6px; border-radius: 3px; background: var(--border); margin: 0.5rem 0; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
    .bullets { margin-top: 0.5rem; font-size: 0.8rem; color: var(--muted); }
    .bullets li { margin: 0.2rem 0 0 1rem; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .watchlist-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.5rem; }
    .watchlist-row span { font-size: 0.9rem; }
    .btn-remove { background: none; border: 1px solid var(--sell); color: var(--sell); padding: 0.25rem 0.6rem; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
    .btn-remove:hover { background: var(--sell); color: #fff; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .add-form input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.9rem; }
    .add-form button, .btn-primary { background: var(--accent); color: #fff; border: none; padding: 0.5rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .btn-primary:hover, .add-form button:hover { opacity: 0.85; }
    .run-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    .status-dot.running { background: var(--buy); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .history-list { display: grid; gap: 0.5rem; }
    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color 0.15s; }
    .history-item:hover { border-color: var(--accent); }
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; margin-top: 1rem; }
    #detail-panel { display: none; margin-top: 1.5rem; }
    #detail-panel.open { display: block; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .detail-section h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
    .detail-section ul { font-size: 0.85rem; padding-left: 1.2rem; }
    .detail-section li { margin: 0.2rem 0; }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
<header>
  <h1>🎮 CS2 <span>Skin Tracker</span></h1>
  <nav>
    <button class="active" data-page="dashboard">Dashboard</button>
    <button data-page="watchlist">Watchlist</button>
    <button data-page="history">History</button>
  </nav>
  <button id="theme-toggle">☀️ Light</button>
</header>

<main>
  <!-- Dashboard -->
  <div id="dashboard" class="page active">
    <div class="run-bar">
      <button class="btn-primary" id="run-btn">▶ Run Analysis Now</button>
      <div class="status-dot" id="status-dot"></div>
      <span id="status-label" style="font-size:0.85rem;color:var(--muted)">Idle</span>
    </div>
    <p class="section-title">Latest Report</p>
    <div id="cards" class="cards"><p class="empty">No report yet — run an analysis or wait for the daily job.</p></div>
  </div>

  <!-- Watchlist -->
  <div id="watchlist" class="page">
    <p class="section-title">Tracked Skins</p>
    <div class="add-form">
      <input id="skin-input" type="text" placeholder="AK-47 | Redline (Field-Tested)" />
      <button id="add-btn">+ Add</button>
    </div>
    <div id="watchlist-items"></div>
  </div>

  <!-- History -->
  <div id="history" class="page">
    <p class="section-title">Report History</p>
    <div id="history-list" class="history-list"></div>
    <div id="detail-panel">
      <div class="chart-wrap"><canvas id="price-chart" height="120"></canvas></div>
      <div class="detail-grid" id="detail-grid"></div>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
let priceChart = null;

// Theme toggle
const html = document.documentElement;
$('theme-toggle').onclick = () => {
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  $('theme-toggle').textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
};

// Nav
document.querySelectorAll('nav button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $(btn.dataset.page).classList.add('active');
  };
});

// ── API helpers ────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch('/api' + path, {
    method,
    headers: body ? {'Content-Type':'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function pct(v) {
  if (v == null) return 'N/A';
  const sign = v >= 0 ? '+' : '';
  return `<span class="${v>=0?'positive':'negative'}">${sign}${v.toFixed(1)}%</span>`;
}
function price(v) { return v != null ? `$${v.toFixed(2)}` : 'N/A'; }

function renderCards(skins) {
  if (!skins || !skins.length) {
    $('cards').innerHTML = '<p class="empty">No skins in this report.</p>';
    return;
  }
  $('cards').innerHTML = skins.map(s => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${s.market_hash_name}</div>
        <span class="badge badge-${s.signal}">${s.signal}</span>
      </div>
      <div class="score-bar"><div class="score-fill" style="width:${s.score}%"></div></div>
      <div class="stat-row"><span>Score</span><span>${s.score}/100</span></div>
      <div class="stat-row"><span>Trend</span><span>${s.trend}</span></div>
      <div class="stat-row"><span>Price</span><span>${price(s.current_price)}</span></div>
      <div class="stat-row"><span>7d</span><span>${pct(s.change_7d_pct)}</span></div>
      <div class="stat-row"><span>30d</span><span>${pct(s.change_30d_pct)}</span></div>
      <div class="stat-row"><span>Buy target</span><span>${price(s.buy_target)}</span></div>
      <div class="stat-row"><span>Sell target</span><span>${price(s.sell_target)}</span></div>
      ${s.risks.length ? `<div class="bullets">⚠️ <b>Risks</b><ul>${s.risks.map(r=>`<li>${r}</li>`).join('')}</ul></div>` : ''}
      ${s.catalysts.length ? `<div class="bullets">✨ <b>Catalysts</b><ul>${s.catalysts.map(c=>`<li>${c}</li>`).join('')}</ul></div>` : ''}
      ${s.float_insight ? `<div class="bullets">🔬 ${s.float_insight}</div>` : ''}
    </div>
  `).join('');
}

async function loadLatestReport() {
  const { dates } = await api('GET', '/reports');
  if (!dates || !dates.length) return;
  const report = await api('GET', `/reports/${dates[0]}`);
  renderCards(report.skins);
}
loadLatestReport();

// Run button
let polling = null;
$('run-btn').onclick = async () => {
  $('run-btn').disabled = true;
  await api('POST', '/analyze/run');
  startPolling();
};

function startPolling() {
  if (polling) return;
  polling = setInterval(async () => {
    const { status } = await api('GET', '/analyze/status');
    const dot = $('status-dot');
    const lbl = $('status-label');
    if (status === 'running') {
      dot.className = 'status-dot running';
      lbl.textContent = 'Running…';
    } else {
      dot.className = 'status-dot';
      lbl.textContent = 'Idle';
      clearInterval(polling); polling = null;
      $('run-btn').disabled = false;
      await loadLatestReport();
    }
  }, 3000);
}

// ── Watchlist ──────────────────────────────────────────────────────────────
async function renderWatchlist() {
  const { skins } = await api('GET', '/watchlist');
  $('watchlist-items').innerHTML = skins.length
    ? skins.map(s => `
        <div class="watchlist-row">
          <span>${s}</span>
          <button class="btn-remove" data-skin="${s}">Remove</button>
        </div>`).join('')
    : '<p class="empty">No skins tracked yet.</p>';
  document.querySelectorAll('.btn-remove').forEach(btn => {
    btn.onclick = async () => {
      await api('DELETE', `/watchlist/${encodeURIComponent(btn.dataset.skin)}`);
      renderWatchlist();
    };
  });
}
renderWatchlist();

$('add-btn').onclick = async () => {
  const val = $('skin-input').value.trim();
  if (!val) return;
  await api('POST', '/watchlist', { market_hash_name: val });
  $('skin-input').value = '';
  renderWatchlist();
};

// ── History ────────────────────────────────────────────────────────────────
async function renderHistory() {
  const { dates } = await api('GET', '/reports');
  if (!dates || !dates.length) {
    $('history-list').innerHTML = '<p class="empty">No reports yet.</p>';
    return;
  }
  $('history-list').innerHTML = dates.map(d => `
    <div class="history-item" data-date="${d}">
      <span>${d}</span>
      <span style="color:var(--muted);font-size:0.8rem">→ view</span>
    </div>`).join('');
  document.querySelectorAll('.history-item').forEach(item => {
    item.onclick = () => loadReportDetail(item.dataset.date);
  });
}
renderHistory();

async function loadReportDetail(d) {
  const report = await api('GET', `/reports/${d}`);
  const panel = $('detail-panel');
  panel.classList.add('open');

  // Build chart data from all skins' current prices
  const labels = report.skins.map(s => s.market_hash_name.split('|')[1]?.trim() || s.name);
  const prices = report.skins.map(s => s.current_price || 0);
  const scores = report.skins.map(s => s.score);

  if (priceChart) priceChart.destroy();
  const ctx = $('price-chart').getContext('2d');
  priceChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Price (USD)', data: prices, backgroundColor: '#7c6af788', borderColor: '#7c6af7', borderWidth: 1, yAxisID: 'y' },
        { label: 'Score', data: scores, type: 'line', borderColor: '#22c55e', backgroundColor: 'transparent', pointRadius: 4, yAxisID: 'y1' },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text') } } },
      scales: {
        y: { ticks: { color: '#888' }, grid: { color: '#2a2a3a' } },
        y1: { position: 'right', min: 0, max: 100, ticks: { color: '#888' }, grid: { drawOnChartArea: false } },
        x: { ticks: { color: '#888' }, grid: { color: '#2a2a3a' } },
      },
    },
  });

  $('detail-grid').innerHTML = report.skins.map(s => `
    <div class="detail-section card">
      <div class="card-header">
        <div class="card-title">${s.market_hash_name}</div>
        <span class="badge badge-${s.signal}">${s.signal} ${s.score}</span>
      </div>
      ${s.summary ? `<p style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem">${s.summary}</p>` : ''}
      <h3>Risks</h3>
      <ul>${(s.risks||[]).map(r=>`<li>${r}</li>`).join('') || '<li>None noted</li>'}</ul>
      <h3 style="margin-top:0.5rem">Catalysts</h3>
      <ul>${(s.catalysts||[]).map(c=>`<li>${c}</li>`).join('') || '<li>None noted</li>'}</ul>
    </div>`).join('');
}
</script>
</body>
</html>
