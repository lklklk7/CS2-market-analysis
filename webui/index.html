<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS2 Market Analysis</title>
  <link rel="icon" type="image/webp" href="/static/favicon.webp"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .pulse { animation: pulse-dot 1.2s infinite; }
    .float-bar-gradient {
      background: linear-gradient(90deg, #ef4444 0%, #f97316 25%, #eab308 50%, #84cc16 75%, #22c55e 100%);
    }
    .skin-card img { transition: transform 0.2s; }
    .skin-card:hover img { transform: scale(1.06); }
  </style>
</head>
<body class="bg-[#0f1923] text-[#e8edf2] min-h-screen text-sm antialiased">

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<header class="bg-[#1a2332] border-b border-[#2a3f55] sticky top-0 z-50">
  <div class="max-w-screen-xl mx-auto px-5 h-14 flex items-center gap-4">
    <a href="#" class="flex items-center gap-2 font-bold text-[15px] shrink-0 mr-2">
      <img src="/static/favicon.webp" class="w-7 h-7" alt="logo"/>
      CS2 Market
    </a>
    <nav class="flex items-center gap-0.5 flex-1">
      <button class="nav-btn px-3 py-1.5 rounded text-[13px] font-medium text-[#8fa3b3] hover:text-white hover:bg-[#243447] transition-colors" data-page="dashboard">Market</button>
      <button class="nav-btn px-3 py-1.5 rounded text-[13px] font-medium text-[#8fa3b3] hover:text-white hover:bg-[#243447] transition-colors" data-page="watchlist">Watchlist</button>
      <button class="nav-btn px-3 py-1.5 rounded text-[13px] font-medium text-[#8fa3b3] hover:text-white hover:bg-[#243447] transition-colors" data-page="history">History</button>
    </nav>
    <div class="flex items-center gap-3 shrink-0">
      <div class="flex items-center gap-1.5 text-xs text-[#8fa3b3]">
        <span id="status-dot" class="w-2 h-2 rounded-full bg-[#8fa3b3] inline-block"></span>
        <span id="status-label">Idle</span>
      </div>
      <button id="run-btn" class="bg-[#e2a829] hover:bg-[#c99424] disabled:opacity-50 text-black font-bold text-xs px-4 py-2 rounded transition-colors">
        ▶&nbsp;Run Analysis
      </button>
    </div>
  </div>
</header>

<!-- ── Content ────────────────────────────────────────────────── -->
<div class="max-w-screen-xl mx-auto px-5 py-6">

  <!-- ── Dashboard ──────────────────────────────────────────── -->
  <div id="dashboard" class="page">

    <!-- Stats bar -->
    <div class="grid grid-cols-4 gap-3 mb-6">
      <div class="bg-[#1e2c3a] border border-[#2a3f55] rounded-lg px-5 py-4">
        <div class="text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3] mb-1.5">Analyzed</div>
        <div class="text-2xl font-bold" id="stat-total">—</div>
      </div>
      <div class="bg-[#1e2c3a] border border-[#2a3f55] rounded-lg px-5 py-4">
        <div class="text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3] mb-1.5">Buy</div>
        <div class="text-2xl font-bold text-green-400" id="stat-buy">—</div>
      </div>
      <div class="bg-[#1e2c3a] border border-[#2a3f55] rounded-lg px-5 py-4">
        <div class="text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3] mb-1.5">Hold</div>
        <div class="text-2xl font-bold text-yellow-400" id="stat-hold">—</div>
      </div>
      <div class="bg-[#1e2c3a] border border-[#2a3f55] rounded-lg px-5 py-4">
        <div class="text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3] mb-1.5">Sell</div>
        <div class="text-2xl font-bold text-red-400" id="stat-sell">—</div>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="flex items-center border-b border-[#2a3f55] mb-5 gap-0">
      <button class="filter-tab px-4 py-2.5 text-[13px] font-semibold border-b-2 border-[#e2a829] text-white transition-colors" data-filter="all" onclick="filterCards('all')">All</button>
      <button class="filter-tab px-4 py-2.5 text-[13px] font-semibold border-b-2 border-transparent text-[#8fa3b3] hover:text-white transition-colors" data-filter="BUY" onclick="filterCards('BUY')">Buy</button>
      <button class="filter-tab px-4 py-2.5 text-[13px] font-semibold border-b-2 border-transparent text-[#8fa3b3] hover:text-white transition-colors" data-filter="HOLD" onclick="filterCards('HOLD')">Hold</button>
      <button class="filter-tab px-4 py-2.5 text-[13px] font-semibold border-b-2 border-transparent text-[#8fa3b3] hover:text-white transition-colors" data-filter="SELL" onclick="filterCards('SELL')">Sell</button>
      <span class="ml-auto text-xs text-[#8fa3b3]" id="report-date"></span>
    </div>

    <!-- Cards grid -->
    <div id="cards-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
      <div class="col-span-full text-center py-20 text-[#8fa3b3]">
        <div class="text-5xl mb-4 opacity-30">🎮</div>
        <div>No report yet — click <strong class="text-white">Run Analysis</strong> to get started.</div>
      </div>
    </div>
  </div>

  <!-- ── Watchlist ───────────────────────────────────────────── -->
  <div id="watchlist" class="page hidden">
    <div class="mb-5">
      <h1 class="text-lg font-bold">Watchlist</h1>
      <p class="text-xs text-[#8fa3b3] mt-1">Skins tracked in every analysis run</p>
    </div>
    <div class="flex gap-2 mb-2">
      <button id="star-btn" class="bg-[#1e2c3a] border border-[#2a3f55] hover:border-[#8fa3b3] text-[#e2a829] font-bold px-3 py-2 rounded text-sm transition-colors">★</button>
      <input id="skin-input" type="text" placeholder="★ M9 Bayonet | Scorched (Field-Tested)"
        class="flex-1 bg-[#1e2c3a] border border-[#2a3f55] focus:border-[#e2a829] text-[#e8edf2] placeholder-[#4a6070] px-3 py-2 rounded outline-none text-sm transition-colors"/>
      <button id="add-btn" class="bg-[#e2a829] hover:bg-[#c99424] text-black font-bold px-4 py-2 rounded text-sm transition-colors">+ Add</button>
    </div>
    <p class="text-[11px] text-[#8fa3b3] mb-5">Knives and gloves require the ★ prefix — click ★ to insert it.</p>
    <div id="watchlist-items"></div>
  </div>

  <!-- ── History ─────────────────────────────────────────────── -->
  <div id="history" class="page hidden">
    <div class="mb-5">
      <h1 class="text-lg font-bold">Report History</h1>
      <p class="text-xs text-[#8fa3b3] mt-1">Click a date to view the full report</p>
    </div>
    <div class="bg-[#1e2c3a] border border-[#2a3f55] rounded-lg overflow-hidden mb-5">
      <table class="w-full">
        <thead>
          <tr class="bg-[#243447]">
            <th class="text-left px-4 py-3 text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3]">Date</th>
            <th class="text-left px-4 py-3 text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3]">Skins</th>
            <th class="text-left px-4 py-3 text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3]">Buy</th>
            <th class="text-left px-4 py-3 text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3]">Hold</th>
            <th class="text-left px-4 py-3 text-[10px] font-semibold uppercase tracking-widest text-[#8fa3b3]">Sell</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
    <div id="detail-drawer" class="hidden">
      <div class="font-bold text-base mb-4" id="detail-title"></div>
      <div class="bg-[#1e2c3a] border border-[#2a3f55] rounded-lg p-5 mb-5">
        <canvas id="price-chart" height="90"></canvas>
      </div>
      <div id="detail-cards" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
    </div>
  </div>

</div><!-- /max-w -->

<script>
const $ = id => document.getElementById(id);
let priceChart = null;
let currentSkins = [];
let currentFilter = 'all';

// ── Navigation ───────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('text-white', 'bg-[#243447]');
    b.classList.add('text-[#8fa3b3]');
  });
  $(name)?.classList.remove('hidden');
  document.querySelectorAll(`.nav-btn[data-page="${name}"]`).forEach(b => {
    b.classList.add('text-white', 'bg-[#243447]');
    b.classList.remove('text-[#8fa3b3]');
  });
}
document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => showPage(b.dataset.page)));
showPage('dashboard');

// ── API ──────────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch('/api' + path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

// ── Helpers ──────────────────────────────────────────────────
const fPrice = v => v != null ? `$${v.toFixed(2)}` : 'N/A';

function wearShort(wear) {
  const w = (wear || '').toLowerCase();
  if (w.includes('factory new'))    return ['FN', 'bg-green-500 text-black'];
  if (w.includes('minimal wear'))   return ['MW', 'bg-cyan-400 text-black'];
  if (w.includes('field-tested'))   return ['FT', 'bg-yellow-400 text-black'];
  if (w.includes('well-worn'))      return ['WW', 'bg-orange-400 text-black'];
  if (w.includes('battle-scarred')) return ['BS', 'bg-red-500 text-white'];
  return [wear?.slice(0,2)?.toUpperCase() || '??', 'bg-gray-500 text-white'];
}

function signalBadge(signal) {
  if (signal === 'BUY')  return 'text-green-400 border-green-500/40 bg-green-500/10';
  if (signal === 'SELL') return 'text-red-400 border-red-500/40 bg-red-500/10';
  return 'text-yellow-400 border-yellow-500/40 bg-yellow-500/10';
}

// ── BUFF-style skin card ─────────────────────────────────────
function skinCard(s) {
  const key = s.market_hash_name.replace(/[^a-z0-9]/gi, '_');
  const isKnife = s.market_hash_name.startsWith('★');
  const [wearLabel, wearCls] = wearShort(s.wear);
  const floatVal = s.csfloat_avg_float ?? null;
  const chg7 = s.change_7d_pct;
  const chg7txt = chg7 != null ? `${chg7 >= 0 ? '+' : ''}${chg7.toFixed(1)}%` : null;
  const chg7cls = chg7 == null ? '' : chg7 >= 0 ? 'text-green-400' : 'text-red-400';

  return `
  <div class="skin-card group bg-[#1e2c3a] border border-[#2a3f55] hover:border-[#4a6f90] rounded-lg overflow-hidden transition-all duration-150 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-black/40 cursor-pointer" data-signal="${s.signal}">
    <!-- Image zone -->
    <div class="relative bg-gradient-to-b from-[#131f2b] to-[#1a2c3d] h-32 flex items-center justify-center overflow-hidden px-3 py-2">
      <span class="${wearCls} text-[9px] font-bold px-1.5 py-0.5 rounded absolute top-2 left-2 leading-none">${isKnife ? '★ ' : ''}${wearLabel}</span>
      <span class="text-[9px] text-[#8fa3b3] bg-black/50 px-1.5 py-0.5 rounded absolute top-2 right-2 leading-none">${s.score}</span>
      <div id="img-${key}" class="w-full h-full flex items-center justify-center">
        <span class="text-4xl opacity-20">🔫</span>
      </div>
    </div>
    <!-- Body -->
    <div class="px-3 pt-2 pb-3">
      ${floatVal != null ? `
      <div class="relative h-[3px] rounded-full overflow-hidden mb-1.5 float-bar-gradient">
        <div class="absolute top-[-3px] w-[2px] h-[9px] bg-white rounded-full shadow-md" style="left:${(floatVal*100).toFixed(1)}%"></div>
      </div>
      <div class="flex justify-between text-[9px] text-[#8fa3b3] mb-1.5">
        <span>Float</span><span class="text-[#e8edf2] font-mono">${floatVal.toFixed(6)}</span>
      </div>` : `<div class="h-[22px] mb-1.5"></div>`}
      <div class="text-[11px] font-medium text-[#c8d8e8] leading-tight truncate mb-2" title="${s.market_hash_name}">${s.market_hash_name}</div>
      <div class="flex items-center justify-between">
        <span class="text-[#e2a829] font-bold text-[13px]">${fPrice(s.current_price)}</span>
        <span class="text-[9px] font-bold px-1.5 py-0.5 rounded border ${signalBadge(s.signal)}">${s.signal}</span>
      </div>
      ${chg7txt ? `<div class="text-[10px] mt-1 ${chg7cls}">${chg7txt} <span class="text-[#8fa3b3]">7d</span></div>` : ''}
    </div>
  </div>`;
}

// ── Dashboard ────────────────────────────────────────────────
function filterCards(filter) {
  currentFilter = filter;
  document.querySelectorAll('.skin-card').forEach(c => {
    c.style.display = (filter === 'all' || c.dataset.signal === filter) ? '' : 'none';
  });
  document.querySelectorAll('.filter-tab').forEach(t => {
    const active = t.dataset.filter === filter;
    t.classList.toggle('border-[#e2a829]', active);
    t.classList.toggle('text-white', active);
    t.classList.toggle('border-transparent', !active);
    t.classList.toggle('text-[#8fa3b3]', !active);
  });
}

async function loadLatestReport() {
  const { dates } = await api('GET', '/reports');
  if (!dates?.length) return;
  $('report-date').textContent = `Last: ${dates[0]}`;
  const report = await api('GET', `/reports/${dates[0]}`);
  renderDashboard(report);
}

function renderDashboard(report) {
  currentSkins = report.skins || [];
  $('stat-total').textContent = currentSkins.length;
  $('stat-buy').textContent   = currentSkins.filter(s => s.signal === 'BUY').length;
  $('stat-hold').textContent  = currentSkins.filter(s => s.signal === 'HOLD').length;
  $('stat-sell').textContent  = currentSkins.filter(s => s.signal === 'SELL').length;

  if (!currentSkins.length) {
    $('cards-grid').innerHTML = '<div class="col-span-full text-center py-20 text-[#8fa3b3]"><div class="text-5xl mb-4 opacity-30">📭</div>No skins in this report.</div>';
    return;
  }
  $('cards-grid').innerHTML = currentSkins.map(skinCard).join('');
  filterCards(currentFilter);
  loadSkinImages(currentSkins);
}

loadLatestReport();

// ── Skin images ──────────────────────────────────────────────
function loadSkinImages(skins) {
  for (const s of skins) {
    if (!s.image_url) continue;
    const key = s.market_hash_name.replace(/[^a-z0-9]/gi, '_');
    const el = document.getElementById(`img-${key}`);
    if (!el) continue;
    el.innerHTML = `<img src="${s.image_url}" alt="${s.market_hash_name}" class="w-full h-full object-contain drop-shadow-lg"
      onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'text-4xl opacity-20',textContent:'🔫'}))" />`;
  }
}

// ── Run button ───────────────────────────────────────────────
let polling = null;
$('run-btn').addEventListener('click', async () => {
  $('run-btn').disabled = true;
  $('run-btn').textContent = '…';
  await api('POST', '/analyze/run');
  startPolling();
});

function startPolling() {
  if (polling) return;
  polling = setInterval(async () => {
    const { status } = await api('GET', '/analyze/status');
    if (status === 'running') {
      $('status-dot').className = 'w-2 h-2 rounded-full bg-green-400 inline-block pulse';
      $('status-label').textContent = 'Running…';
    } else {
      $('status-dot').className = 'w-2 h-2 rounded-full bg-[#8fa3b3] inline-block';
      $('status-label').textContent = 'Idle';
      clearInterval(polling); polling = null;
      $('run-btn').disabled = false;
      $('run-btn').textContent = '▶ Run Analysis';
      await loadLatestReport();
    }
  }, 3000);
}

// ── Watchlist ────────────────────────────────────────────────
async function renderWatchlist() {
  const { skins } = await api('GET', '/watchlist');
  $('watchlist-items').innerHTML = skins.length
    ? skins.map(s => `
        <div class="flex items-center justify-between px-4 py-3 bg-[#1e2c3a] border border-[#2a3f55] hover:border-[#4a6f90] rounded-lg mb-2 transition-colors">
          <span class="text-sm font-medium">${s}</span>
          <button class="btn-danger text-[11px] font-semibold text-red-400 border border-red-500/30 hover:bg-red-500/10 px-2.5 py-1 rounded transition-colors" data-skin="${s}">Remove</button>
        </div>`).join('')
    : '<div class="text-center py-16 text-[#8fa3b3]"><div class="text-5xl mb-4 opacity-30">⭐</div>Add skins above to start tracking them.</div>';

  document.querySelectorAll('.btn-danger').forEach(btn => {
    btn.addEventListener('click', async () => {
      await api('DELETE', `/watchlist/${encodeURIComponent(btn.dataset.skin)}`);
      renderWatchlist();
    });
  });
}
renderWatchlist();

$('star-btn').addEventListener('click', () => {
  const inp = $('skin-input');
  if (!inp.value.startsWith('★')) inp.value = '★ ' + inp.value;
  inp.focus();
});
$('add-btn').addEventListener('click', async () => {
  const val = $('skin-input').value.trim();
  if (!val) return;
  await api('POST', '/watchlist', { market_hash_name: val });
  $('skin-input').value = '';
  renderWatchlist();
});
$('skin-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('add-btn').click(); });

// ── History ──────────────────────────────────────────────────
async function renderHistory() {
  const { dates } = await api('GET', '/reports');
  const tbody = $('history-tbody');
  if (!dates?.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-[#8fa3b3]">No reports yet</td></tr>';
    return;
  }
  const rows = await Promise.all(dates.map(async d => {
    const r = await api('GET', `/reports/${d}`);
    return { d, skins: r.skins || [] };
  }));
  tbody.innerHTML = rows.map(({ d, skins }) => `
    <tr class="border-t border-[#2a3f55] hover:bg-[#243447] cursor-pointer transition-colors" data-date="${d}">
      <td class="px-4 py-3 font-semibold">${d}</td>
      <td class="px-4 py-3 text-[#8fa3b3]">${skins.length}</td>
      <td class="px-4 py-3 font-semibold text-green-400">${skins.filter(s=>s.signal==='BUY').length}</td>
      <td class="px-4 py-3 font-semibold text-yellow-400">${skins.filter(s=>s.signal==='HOLD').length}</td>
      <td class="px-4 py-3 font-semibold text-red-400">${skins.filter(s=>s.signal==='SELL').length}</td>
    </tr>`).join('');

  tbody.querySelectorAll('tr').forEach(row => {
    row.addEventListener('click', () => loadHistoryDetail(row.dataset.date));
  });
}
renderHistory();

async function loadHistoryDetail(d) {
  const report = await api('GET', `/reports/${d}`);
  const skins = report.skins || [];
  const drawer = $('detail-drawer');
  drawer.classList.remove('hidden');
  $('detail-title').textContent = `Report — ${d}`;

  if (priceChart) priceChart.destroy();
  priceChart = new Chart($('price-chart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: skins.map(s => (s.name || s.market_hash_name.split('|')[0]).trim()),
      datasets: [
        {
          label: 'Price (USD)',
          data: skins.map(s => s.current_price || 0),
          backgroundColor: skins.map(s => s.signal==='BUY' ? 'rgba(74,222,128,0.35)' : s.signal==='SELL' ? 'rgba(248,113,113,0.35)' : 'rgba(250,204,21,0.3)'),
          borderColor:     skins.map(s => s.signal==='BUY' ? '#4ade80' : s.signal==='SELL' ? '#f87171' : '#facc15'),
          borderWidth: 1, yAxisID: 'y',
        },
        {
          label: 'Score', type: 'line',
          data: skins.map(s => s.score),
          borderColor: '#e2a829', backgroundColor: 'rgba(226,168,41,0.08)',
          pointBackgroundColor: '#e2a829', pointRadius: 4,
          fill: true, tension: 0.35, yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8fa3b3', font: { size: 11 } } } },
      scales: {
        y:  { ticks: { color: '#8fa3b3', callback: v => `$${v}` }, grid: { color: '#243447' } },
        y1: { position: 'right', min: 0, max: 100, ticks: { color: '#8fa3b3' }, grid: { drawOnChartArea: false } },
        x:  { ticks: { color: '#8fa3b3' }, grid: { color: '#243447' } },
      },
    },
  });

  $('detail-cards').innerHTML = skins.map(skinCard).join('');
  loadSkinImages(skins);
  drawer.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
